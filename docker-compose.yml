services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmlmap
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mmlmap" ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - db-data:/var/lib/postgresql/data

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/mmlmap
      PORT: 3000
      SESSION_SECRET: change-me-in-prod
      # User management via environment variables
      # Format: "username:password,username:password,..."
      # Example: "admin:secret123,user2:pass456,viewer:readonly"
      # Backward compatible: ADMIN_PASSWORD is treated as "admin:ADMIN_PASSWORD"
      USERS: ${USERS:-admin:admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}  # Deprecated, use USERS instead
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - tile-cache:/var/cache/nginx/tiles:ro
    ports:
      - "3000:3000"

  cache-proxy:
    build: ./cache-proxy
    ports:
      - "8888:8888"
    volumes:
      - tile-cache:/var/cache/nginx/tiles
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/health" ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  web:
    build:
      context: .
      args:
        NODE_ENV: production
        # Cache proxy URL - empty means use relative paths (/tiles/*, /wms/*)
        # These are proxied by host Caddy to cache-proxy:8888 internally
        # Local dev with direct cache access: VITE_TILE_CACHE_URL=http://localhost:8888
        VITE_TILE_CACHE_URL: ""
    environment:
      NODE_ENV: production
    depends_on:
      - server
      - cache-proxy
    ports:
      - "8080:80"  # Internal port 80, external port 8080 (host Caddy on port 80)

volumes:
  db-data:
  tile-cache:
