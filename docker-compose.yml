services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmlmap
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mmlmap" ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - db-data:/var/lib/postgresql/data

  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/mmlmap
      PORT: 3000
      SESSION_SECRET: change-me-in-prod
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  cache-proxy:
    build: ./cache-proxy
    ports:
      - "8888:8888"
    volumes:
      - tile-cache:/var/cache/nginx/tiles
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8888/health" ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  web:
    build:
      context: .
      args:
        NODE_ENV: production
        # Cache proxy URL accessible from browser
        # Production default: intelmap.elderx.fi:8888
        # Local dev: override with VITE_TILE_CACHE_URL=http://localhost:8888
        VITE_TILE_CACHE_URL: ${VITE_TILE_CACHE_URL:-http://intelmap.elderx.fi:8888}
    environment:
      NODE_ENV: production
    depends_on:
      - server
      - cache-proxy
    ports:
      - "80:80"

volumes:
  db-data:
  tile-cache:
