# Cache levels and zone configuration
proxy_cache_path /var/cache/nginx/tiles/v5
    levels=1:2 
    keys_zone=tile_cache:100m 
    max_size=10g 
    inactive=180d 
    use_temp_path=off;

# Determine if we should add our own CORS header
map $upstream_http_access_control_allow_origin $cors_response_header {
    default "";
    "" "*";
}

# Rate limiting for upstream requests
limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=500r/s;

server {
    listen 8888;
    server_name localhost;
    # Docker internal DNS is best for container networking
    resolver 127.0.0.11 ipv6=off;
    
    # Disable SSL verification for upstream (avoids CA bundle issues)
    proxy_ssl_verify off;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # CORS: ONLY add origin header if upstream didn't provide one
    add_header Access-Control-Allow-Origin $cors_response_header always;

    # Cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;
    
    # Expose headers to the browser
    add_header Access-Control-Expose-Headers "X-Cache-Status" always;

    # ============================================
    # MML WMTS Tiles (Maanmittauslaitos)
    # ============================================
    location /tiles/mml/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        
        # Strip our prefix and proxy to MML
        rewrite ^/tiles/mml/(.*)$ /$1 break;
        proxy_pass https://avoin-karttakuva.maanmittauslaitos.fi;
        
        proxy_ssl_server_name on;
        proxy_set_header Host avoin-karttakuva.maanmittauslaitos.fi;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # OpenStreetMap Tiles
    # ============================================
    location /tiles/osm/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/osm/(.*)$ /$1 break;
        proxy_pass https://tile.openstreetmap.org;
        
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header User-Agent "MML-Map-Cache/1.0";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Mapbox Vector Tiles & Styles
    # ============================================
    location /tiles/mapbox/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/mapbox/(.*)$ /$1 break;
        proxy_pass https://api.mapbox.com;
        
        proxy_ssl_server_name on;
        proxy_set_header Host api.mapbox.com;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # MapAnt Orienteering Maps
    # ============================================
    location /tiles/mapant/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/mapant/(.*)$ /$1 break;
        proxy_pass https://wmts.mapant.fi;
        
        proxy_ssl_server_name on;
        proxy_set_header Host wmts.mapant.fi;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Esri World Imagery
    # ============================================
    location /tiles/esri/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/esri/(.*)$ /$1 break;
        proxy_pass https://services.arcgisonline.com;
        
        proxy_ssl_server_name on;
        proxy_set_header Host services.arcgisonline.com;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # CartoDB Backgrounds (Hardcoded Subdomains)
    # ============================================
    location /tiles/carto/a/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/carto/a/(.*)$ /$1 break;
        proxy_pass https://a.basemaps.cartocdn.com;
        
        proxy_ssl_server_name on;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        limit_req zone=tile_limit burst=200 nodelay;
    }

    location /tiles/carto/b/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/carto/b/(.*)$ /$1 break;
        proxy_pass https://b.basemaps.cartocdn.com;
        
        proxy_ssl_server_name on;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        limit_req zone=tile_limit burst=200 nodelay;
    }

    location /tiles/carto/c/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/carto/c/(.*)$ /$1 break;
        proxy_pass https://c.basemaps.cartocdn.com;
        
        proxy_ssl_server_name on;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Digiroad WMS Overlay
    # ============================================
    location /wms/digiroad/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        proxy_cache_key $scheme$proxy_host$request_uri;
        
        rewrite ^/wms/digiroad/(.*)$ /$1 break;
        proxy_pass https://avoinapi.vaylapilvi.fi;
        
        proxy_ssl_server_name on;
        proxy_set_header Host avoinapi.vaylapilvi.fi;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        
        limit_req zone=tile_limit burst=100 nodelay;
    }

    # ============================================
    # NASA GIBS Tiles
    # ============================================
    location /tiles/nasa/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/nasa/(.*)$ /$1 break;
        proxy_pass https://gibs.earthdata.nasa.gov;
        
        proxy_ssl_server_name on;
        proxy_set_header Host gibs.earthdata.nasa.gov;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Overpass API Proxy (OSM Dynamic Features)
    # ============================================
    location /osm-api/kumi/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        
        # Stability: simplified key and forced hit
        proxy_cache_key $request_uri;
        proxy_cache_bypass 0;
        proxy_no_cache 0;
        
        rewrite ^/osm-api/kumi/(.*)$ /$1 break;
        proxy_pass https://overpass.kumi.systems;
        
        proxy_ssl_server_name on;
        proxy_set_header Host overpass.kumi.systems;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires Vary;

        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        limit_req zone=tile_limit burst=500 nodelay;
    }

    location /osm-api/de/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        
        proxy_cache_key $request_uri;
        proxy_cache_bypass 0;
        proxy_no_cache 0;
        
        rewrite ^/osm-api/de/(.*)$ /$1 break;
        proxy_pass https://overpass-api.de;
        
        proxy_ssl_server_name on;
        proxy_set_header Host overpass-api.de;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires Vary;

        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;

        add_header Cache-Control "no-cache, no-store, must-revalidate";
        limit_req zone=tile_limit burst=500 nodelay;
    }
}
