# Cache levels and zone configuration
proxy_cache_path /var/cache/nginx/tiles 
    levels=1:2 
    keys_zone=tile_cache:100m 
    max_size=10g 
    inactive=180d 
    use_temp_path=off;

# Rate limiting for upstream requests (prevent hammering external servers)
limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=100r/s;

server {
    listen 8888;
    server_name localhost;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Cache status header for debugging
    add_header X-Cache-Status $upstream_cache_status always;

    # ============================================
    # MML WMTS Tiles (Maanmittauslaitos)
    # ============================================
    location /tiles/mml/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        
        # Strip our prefix and proxy to MML
        rewrite ^/tiles/mml/(.*)$ /$1 break;
        proxy_pass https://avoin-karttakuva.maanmittauslaitos.fi;
        
        proxy_ssl_server_name on;
        proxy_set_header Host avoin-karttakuva.maanmittauslaitos.fi;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # OpenStreetMap Tiles
    # ============================================
    location /tiles/osm/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/osm/(.*)$ /$1 break;
        proxy_pass https://tile.openstreetmap.org;
        
        proxy_ssl_server_name on;
        proxy_set_header Host tile.openstreetmap.org;
        proxy_set_header User-Agent "MML-Map-Cache/1.0";
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Mapbox Vector Tiles & Styles
    # ============================================
    location /tiles/mapbox/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/mapbox/(.*)$ /$1 break;
        proxy_pass https://api.mapbox.com;
        
        proxy_ssl_server_name on;
        proxy_set_header Host api.mapbox.com;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Esri World Imagery
    # ============================================
    location /tiles/esri/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        rewrite ^/tiles/esri/(.*)$ /$1 break;
        proxy_pass https://services.arcgisonline.com;
        
        proxy_ssl_server_name on;
        proxy_set_header Host services.arcgisonline.com;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # CartoDB Dark Basemap
    # ============================================
    location ~ ^/tiles/carto/([a-c])/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        # CartoDB uses subdomains a-c for load balancing
        rewrite ^/tiles/carto/([a-c])/(.*)$ /$2 break;
        set $carto_subdomain $1;
        proxy_pass https://$carto_subdomain.basemaps.cartocdn.com;
        
        proxy_ssl_server_name on;
        proxy_set_header Host $carto_subdomain.basemaps.cartocdn.com;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie Cache-Control Expires;
        
        limit_req zone=tile_limit burst=200 nodelay;
    }

    # ============================================
    # Digiroad WMS Overlay
    # ============================================
    location /wms/digiroad/ {
        proxy_cache tile_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_revalidate on;
        proxy_cache_lock on;
        
        # WMS uses query params - include them in cache key (default behavior)
        proxy_cache_key $scheme$proxy_host$request_uri;
        
        rewrite ^/wms/digiroad/(.*)$ /$1 break;
        proxy_pass https://avoinapi.vaylapilvi.fi;
        
        proxy_ssl_server_name on;
        proxy_set_header Host avoinapi.vaylapilvi.fi;
        proxy_hide_header Set-Cookie;
        proxy_ignore_headers Set-Cookie;
        
        limit_req zone=tile_limit burst=100 nodelay;
    }
}
