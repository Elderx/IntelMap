name: Deploy to EC2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /home/ubuntu/IntelMap

            # Pull latest main branch (has deploy-all.sh script)
            git fetch origin
            git checkout main
            git pull origin main

            # Run full deployment script (handles production + staging)
            chmod +x deploy-all.sh
            ./deploy-all.sh
