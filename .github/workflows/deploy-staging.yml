name: Deploy Staging to EC2

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /home/ubuntu/IntelMap
            git fetch origin
            git checkout dev
            git pull origin dev
            sudo docker compose -f docker-compose.yml -f docker-compose.staging.yml -p intelmap-staging down
            sudo docker compose -f docker-compose.yml -f docker-compose.staging.yml -p intelmap-staging up --build -d
            sudo docker compose -f docker-compose.yml -f docker-compose.staging.yml -p intelmap-staging exec -T db psql -U postgres -c "CREATE DATABASE mmlmap_staging;" || true
